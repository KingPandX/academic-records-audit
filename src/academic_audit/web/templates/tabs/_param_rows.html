{% if params %}
<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>Clave</th>
        <th>Valor</th>
        <th>Descripci&oacute;n</th>
        <th>Actualizado</th>
      </tr>
    </thead>
    <tbody>
      {% for p in params %}
      <tr>
        <td>{{ p.key }}</td>
        <td>{{ p.value }}</td>
        <td>{{ p.description or "" }}</td>
        <td>{{ p.get("updated_at", "") }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty-state">No hay par&aacute;metros configurados</div>
{% endif %}
