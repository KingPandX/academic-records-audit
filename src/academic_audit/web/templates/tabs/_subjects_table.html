{% if subjects %}
<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>C&oacute;digo</th>
        <th>Nombre</th>
        <th>Cr&eacute;ditos</th>
        <th>Semestre</th>
        <th>Tipo</th>
      </tr>
    </thead>
    <tbody>
      {% for s in subjects %}
      <tr>
        <td>{{ s.code }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.credits }}</td>
        <td>{{ s.semester }}</td>
        <td>{{ s.type }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty-state">Sin materias para este programa</div>
{% endif %}
